<script>
lucide.createIcons();
const themeToggle=document.getElementById('theme-toggle'),html=document.documentElement,logoImg=document.getElementById('logo-img');
const getThemePreference=()=>{if(typeof localStorage!=='undefined'&&localStorage.getItem('theme'))return localStorage.getItem('theme');return window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'};
const setTheme=theme=>{if(theme==='dark'){html.classList.add('dark');if(logoImg)logoImg.src='img/logo-light.png';}else{html.classList.remove('dark');if(logoImg)logoImg.src='img/logo-app.png';}localStorage.setItem('theme',theme);};
setTheme(getThemePreference());
themeToggle.addEventListener('click',()=>{const newTheme=html.classList.contains('dark')?'light':'dark';setTheme(newTheme);lucide.createIcons();});
const mobileMenuBtn=document.getElementById('mobile-menu-btn'),mobileMenu=document.getElementById('mobile-menu');
mobileMenuBtn.addEventListener('click',()=>mobileMenu.classList.toggle('hidden'));
mobileMenu.querySelectorAll('a').forEach(link=>link.addEventListener('click',()=>mobileMenu.classList.add('hidden')));
</script>
